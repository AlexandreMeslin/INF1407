{% load static %}
<!DOCTYPE html>
<html lang="pt-BR" class="{{ request.session.theme|default:'light' }} container-layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Contatos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'contatos/css/estilo.css' %}">
    <link rel="stylesheet" href="{% static 'contatos/css/lista-contato.css' %}">
    <link rel="stylesheet" href="{% static 'contatos/css/basico.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
</head>

<body>
    {% include 'contatos/links.html' %}

    <div class="container-row container-layout">
        <div class="lista-contatos">
            <div class="justify-content-between">
                <h2>Contatos</h2>
                <a href="{% url 'contatos:cria-contato' %}" class="btn btn-success">
                    +&nbsp;Novo
                </a>
            </div>

            <div class="relative">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="search-icon">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                </svg>
                <input placeholder="Buscar contato..." value="">
            </div>

            {% for pessoa in pessoas %}
            <div class="container-row">
                <div>
                {% if pessoa.avatar %}
                    <img src="{{ pessoa.avatar.url }}" alt="Avatar" class="avatar">
                {% else %}
                    <div class="fundo-verde avatar alinhamento-horizontal-centro">
                        <p>{{ pessoa.iniciais }}</p>
                    </div>
                {% endif %}
                </div>
                <div>
                    <p class="nome">{{ pessoa.nome }}</p>
                    <p class="telefone">{{ pessoa.telefone }}</p>
                </div>
            </div>
            {% empty %}
            <p>Nenhum contato encontrado.</p>
            {% endfor %}
        </div>
        
        <div class="um-contato">
        </div>
    </div>

    <footer>
        <a href="{% url 'contatos:toggle-theme' %}">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250">
                <circle cx="125" cy="125" r="113.2" fill="#fff"/>
                <path d="m125,11.8 a56.6,56.6 0 0 1 0,113.2 56.6,56.6 0 0 0 0,113.2 113.2,113.2 0 0 0 0,-226.4"/>
                <circle cx="125" cy="68.4" r="17.6"/>
                <circle cx="125" cy="181.6" r="17.6" fill="#fff"/>
            </svg>
        </a>
    </footer>

</body>

</html>
