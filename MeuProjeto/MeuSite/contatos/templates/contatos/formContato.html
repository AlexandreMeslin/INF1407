{% load static %}
<!DOCTYPE html>
<html lang="pt-BR" class="{{ request.session.theme|default:'light' }} container-layout">

<head>
    <!--
    Ao usar esse template para criar ou atualizar um contato, os seguintes contextos devem ser passados pela view:
    - title_head: O título a ser exibido na aba do navegador
    - title_page: O título a ser exibido na página
    - title_legend: O título a ser exibido na legenda do fieldset do formulário
    - text_submit: O texto a ser exibido no botão de submit do formulário
    - status_form: A classe CSS a ser aplicada ao tbody do formulário, que pode ser usada para estilizar o formulário de acordo com o contexto
    - pessoa: O formulário de criação ou atualização do contato, que deve ser passado como um objeto do tipo ModelForm
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'contatos/css/estilo.css' %}">
    <link rel="stylesheet" href="{% static 'contatos/css/lista-contato.css' %}">
    <link rel="stylesheet" href="{% static 'contatos/css/basico.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <title>{{ title_head }}</title>
</head>

<body>
    {% include 'contatos/links.html' %}

    <div class="modal" tabindex="-1" style="display: block;">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content  cor-modal">
                <div class="modal-header">
                    <h5 class="modal-title">{{ title_page }}</h5>
                    <a href="{% url 'contatos:lista-contatos' %}" class="btn btn-close" data-bs-dismiss="modal" aria-label="Close"></a>
                </div>
                <form method="POST" class='formulario' enctype="multipart/form-data">
                    <div class="modal-body">
                        <fieldset>
                            <legend>{{ title_legend }}</legend>
                            {% csrf_token %}
                            <table>
                                <tbody class="{{ status_form }}">
                                    {{ pessoa.as_table }}
                                </tbody>
                            </table>
                        </fieldset>
                    </div>
                    <div class="modal-footer">
                        <a href="{% url 'contatos:lista-contatos' %}" class="btn btn-secondary" data-bs-dismiss="modal">Cancela</a>
                        <button type="submit" class="btn btn-primary">{{ text_submit }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <a href="{% url 'contatos:toggle-theme' %}">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250">
                <circle cx="125" cy="125" r="113.2" fill="#fff"/>
                <path d="m125,11.8 a56.6,56.6 0 0 1 0,113.2 56.6,56.6 0 0 0 0,113.2 113.2,113.2 0 0 0 0,-226.4"/>
                <circle cx="125" cy="68.4" r="17.6"/>
                <circle cx="125" cy="181.6" r="17.6" fill="#fff"/>
            </svg>
        </a>
    </footer>

</body>
</html>
