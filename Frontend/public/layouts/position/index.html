<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo de posição</h1>

    <h2>Posição relativa</h2>
    <div style="position: relative; background-color: #f0f0f0; padding: 20px;">
        <div style="position: relative; background-color: #ff9999; padding: 20px;">Item 1</div>
        <div style="position: relative; background-color: #99ff99; padding: 20px;">Item 2</div>
        <div style="position: relative; background-color: #9999ff; padding: 20px;">Item 3</div>
        <div style="position: relative; background-color: #ffff99; padding: 20px;">Item 4</div>
        <div style="position: relative; background-color: #ff99ff; padding: 20px;">Item 5</div>
    </div>

    <h2>Posição absoluta</h2>
    <div style="position: relative; background-color: #f0f0f0; padding: 20px;">
        <div style="position: absolute; top: 10px; left: 10px; background-color: #ff9999; padding: 20px;">Item 1</div>
        <div style="position: absolute; top: 10px; left: 100px; background-color: #99ff99; padding: 20px;">Item 2</div>
        <div style="position: absolute; top: 10px; left: 200px; background-color: #9999ff; padding: 20px;">Item 3</div>
        <div style="position: absolute; top: 10px; left: 300px; background-color: #ffff99; padding: 20px;">Item 4</div>
        <div style="position: absolute; top: 10px; left: 400px; background-color: #ff99ff; padding: 20px;">Item 5</div>
    </div>

    <h2>Posição fixa</h2>
    <div style="position: fixed; top: 10px; left: 10px; background-color: #ff9999; padding: 20px;">
        Item Fixo
    </div>

    <h2>Posição sticky</h2>
    <div style="position: sticky; top: 0; background-color: #99ff99; padding: 20px;">
        Item Sticky
    </div>
</body>
</html>
