{% extends 'seguranca/base.html' %}
{% load static %}

{% block titulo %}Login{% endblock %}

{% block scripts %}
    <script src="{% static 'seguranca/javascript.js' %}"></script>
{% endblock %}

{% block conteudo %}
    <h2>Página de Login</h2>
    <form method="post">
        {% csrf_token %}
        <table class="formulario">
            {{ form.as_table }}
            <tr>
                <td></td>
                <td><input type="submit" value="Login"></td>
            </tr>
        </table>
    </form>
    <a href="{% url 'sec-password_reset' %}">Esqueceu a senha?</a>
    <div id="mensagem">
    </div>
{% endblock %}
